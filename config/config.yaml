# Customer Analytics ETL Pipeline Configuration
# Override via Databricks widgets or environment variables in production.

environment: dev

storage:
  # ADLS Gen2 abfss:// container paths (Unity Catalog external locations)
  account_name: "${STORAGE_ACCOUNT_NAME}"
  container: "customer-analytics"
  base_path: "abfss://${STORAGE_ACCOUNT_NAME}@datalake.dfs.core.windows.net/customer-analytics"

catalog:
  name: "customer_analytics"
  bronze_schema: "bronze"
  silver_schema: "silver"
  gold_schema: "gold"
  audit_schema: "audit"

paths:
  landing:
    customers: "{base_path}/landing/customers"
    transactions: "{base_path}/landing/transactions"
    activity_logs: "{base_path}/landing/activity_logs"
  bronze:
    customers: "{base_path}/bronze/customers"
    transactions: "{base_path}/bronze/transactions"
    activity_logs: "{base_path}/bronze/activity_logs"
  silver:
    customers: "{base_path}/silver/customers"
    transactions: "{base_path}/silver/transactions"
    activity_logs: "{base_path}/silver/activity_logs"
  gold:
    customer_metrics: "{base_path}/gold/customer_metrics"
    customer_segmentation: "{base_path}/gold/customer_segmentation"
    revenue_metrics: "{base_path}/gold/revenue_metrics"
    activity_scores: "{base_path}/gold/activity_scores"
    monthly_growth: "{base_path}/gold/monthly_growth"
  audit:
    pipeline_runs: "{base_path}/audit/pipeline_runs"
    data_quality: "{base_path}/audit/data_quality"

tables:
  bronze:
    customers: "{catalog}.{bronze_schema}.customers"
    transactions: "{catalog}.{bronze_schema}.transactions"
    activity_logs: "{catalog}.{bronze_schema}.activity_logs"
  silver:
    customers: "{catalog}.{silver_schema}.customers"
    transactions: "{catalog}.{silver_schema}.transactions"
    activity_logs: "{catalog}.{silver_schema}.activity_logs"
  gold:
    customer_lifetime_value: "{catalog}.{gold_schema}.customer_lifetime_value"
    customer_segmentation: "{catalog}.{gold_schema}.customer_segmentation"
    revenue_metrics: "{catalog}.{gold_schema}.revenue_metrics"
    activity_scores: "{catalog}.{gold_schema}.activity_scores"
    monthly_growth: "{catalog}.{gold_schema}.monthly_growth"
  audit:
    pipeline_runs: "{catalog}.{audit_schema}.pipeline_runs"
    data_quality: "{catalog}.{audit_schema}.data_quality_checks"

processing:
  incremental_lookback_days: 7
  partition_columns:
    customers: ["registration_year"]
    transactions: ["transaction_year", "transaction_month"]
    activity_logs: ["event_date"]
  z_order_columns:
    customers: ["customer_id", "email"]
    transactions: ["customer_id", "transaction_id"]
    activity_logs: ["customer_id", "event_timestamp"]
    customer_lifetime_value: ["customer_id", "lifetime_revenue"]
    revenue_metrics: ["country", "state"]
  vacuum_retention_hours: 168  # 7 days

data_quality:
  null_threshold_pct: 5.0
  duplicate_threshold_pct: 1.0
  min_record_count: 1
  required_columns:
    customers: ["customer_id", "email", "registration_date"]
    transactions: ["transaction_id", "customer_id", "amount", "transaction_date"]
    activity_logs: ["event_id", "customer_id", "event_type", "event_timestamp"]

segmentation:
  rfm:
    recency_days: [30, 90, 180]
    frequency_bins: [1, 3, 6]
    monetary_bins: [100, 500, 1000]
